<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>office Comics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
<style>
  :root { --ink:#16130f; --accent:#f5b820; --paper:#f3ecdd; --card:#fffdf7; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Helvetica Neue',Arial,sans-serif; color:var(--ink);
    background-color:var(--paper); background-image:radial-gradient(#00000010 1.4px,transparent 1.4px);
    background-size:18px 18px; padding:0 clamp(20px,5vw,72px) 100px; }
  header { display:flex; flex-wrap:wrap; align-items:flex-end; justify-content:space-between; gap:20px;
    padding:40px 0 30px; max-width:1180px; margin:0 auto; border-bottom:4px solid var(--ink); }
  .title { font-family:'Bangers',cursive; font-size:clamp(46px,8vw,82px); line-height:.92;
    letter-spacing:2px; text-shadow:4px 4px 0 var(--accent); }
  .badge { display:inline-block; background:var(--ink); color:#fff; font-size:12px; font-weight:800;
    letter-spacing:1.5px; text-transform:uppercase; padding:5px 11px; transform:rotate(-2deg); margin-top:8px; }
  .sub { font-size:14px; color:#6b6355; font-weight:600; margin-top:8px; }
  .grid { max-width:1180px; margin:0 auto; display:grid; grid-template-columns:repeat(3,minmax(0,1fr));
    gap:30px; padding-top:44px; }
  @media(max-width:820px){ .grid{ grid-template-columns:repeat(2,1fr); } }
  @media(max-width:520px){ .grid{ grid-template-columns:1fr; } }
  .card { padding:12px 12px 16px; background:var(--card); border:3px solid var(--ink);
    box-shadow:7px 7px 0 var(--ink); cursor:pointer; transition:transform .13s ease,box-shadow .13s ease; }
  .card:hover { transform:rotate(0deg) translateY(-4px)!important; box-shadow:11px 13px 0 var(--ink); }
  .card img { display:block; width:100%; height:auto; border:2px solid var(--ink); background:var(--card); }
  .lb { position:fixed; inset:0; z-index:50; display:none; align-items:center; justify-content:center;
    padding:4vh 4vw; background-color:rgba(15,12,8,.86);
    background-image:radial-gradient(#ffffff18 1.5px,transparent 1.5px); background-size:16px 16px; }
  .lb.open { display:flex; }
  .lb img { max-width:84vw; max-height:82vh; display:block; background:var(--card); padding:14px;
    border:4px solid var(--ink); box-shadow:12px 12px 0 rgba(0,0,0,.35); }
</style>
</head>
<body>
  <header>
    <div>
      <div class="title">office Comics</div>
      <div><span class="badge" id="count"></span></div>
      <div class="sub">Drawings by Jake</div>
    </div>
  </header>
  <main class="grid" id="grid"></main>

  const lb = document.getElementById('lb');
  const lbimg = document.getElementById('lbimg');

  DRAWINGS.forEach(d => {
    const b = document.createElement('button');
    b.className = 'card';
    b.style.cssText = 'appearance:none;display:block;transform:rotate('+(d.rot||0).toFixed(2)+'deg);';
    const img = document.createElement('img');
    img.src = d.src; img.alt = "Jake's drawing";

  });
  lb.addEventListener('click', () => lb.classList.remove('open'));
  document.addEventListener('keydown', e => { if(e.key==='Escape') lb.classList.remove('open'); });
